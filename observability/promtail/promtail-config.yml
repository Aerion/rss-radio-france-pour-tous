server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discovers all containers on the host via the Docker socket, rather than
  # the Loki Docker logging-driver plugin - that would need a host-level
  # `docker plugin install` step outside this compose file, which is easy
  # to forget when redeploying to a fresh box. This stays fully declared
  # here, reproducible with just `docker compose up`.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
